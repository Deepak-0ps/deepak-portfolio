<svg width="860" height="230" viewBox="0 0 860 230" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="860" height="230" fill="#f4efe6"/>
  <!-- Label -->
  <rect x="4" y="4" width="80" height="32" rx="8" fill="#1a1a1a" opacity="0.15"/>
  <rect x="0" y="0" width="80" height="32" rx="8" fill="#FFD93D" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="40" y="21" text-anchor="middle" font-size="13" font-weight="800" fill="#1a1a1a" letter-spacing="1.5">ABOUT</text>

  <!-- Card shadow -->
  <rect x="4" y="48" width="856" height="178" rx="12" fill="#1a1a1a" opacity="0.12"/>
  <!-- Card -->
  <rect x="0" y="44" width="856" height="178" rx="12" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Text line 1 -->
  <text x="22" y="76" font-size="13.5" fill="#333333">Highly experienced and dynamic software engineer with a rich professional background spanning over</text>
  <!-- highlight: 11 years -->
  <rect x="617" y="62" width="62" height="20" rx="3" fill="#FFD93D"/>
  <text x="648" y="76" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1a1a1a">11 years</text>
  <text x="685" y="76" font-size="13.5" fill="#333333">. Throughout my career,</text>

  <!-- Text line 2 -->
  <text x="22" y="97" font-size="13.5" fill="#333333">I've held positions in renowned tech companies across</text>
  <!-- highlight: Albania, France... -->
  <rect x="331" y="83" width="210" height="20" rx="3" fill="#6C8EFF"/>
  <text x="436" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Albania, France, USA, and Germany</text>
  <text x="547" y="97" font-size="13.5" fill="#333333">. My contributions</text>

  <!-- Text line 3 -->
  <text x="22" y="118" font-size="13.5" fill="#333333">have been pivotal in designing and constructing</text>
  <!-- highlight: microservices -->
  <rect x="302" y="104" width="216" height="20" rx="3" fill="#6C8EFF"/>
  <text x="410" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">microservices for distributed systems</text>
  <text x="524" y="118" font-size="13.5" fill="#333333">, implementing</text>

  <!-- Text line 4 -->
  <!-- highlight: data pipelines -->
  <rect x="22" y="130" width="196" height="20" rx="3" fill="#6C8EFF"/>
  <text x="120" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">data pipelines on Google Cloud</text>
  <text x="224" y="144" font-size="13.5" fill="#333333">, and engaging in</text>
  <!-- highlight: full-stack development -->
  <rect x="370" y="130" width="176" height="20" rx="3" fill="#6BCB77"/>
  <text x="458" y="144" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">full-stack development</text>
  <text x="552" y="144" font-size="13.5" fill="#333333">.</text>

  <!-- Text line 5 -->
  <text x="22" y="168" font-size="13.5" fill="#333333">My passion for <tspan font-weight="700">continuous learning and innovation</tspan> is evident through my active presence on various platforms. I thrive on</text>
  <text x="22" y="189" font-size="13.5" fill="#333333">staying updated with the <tspan font-weight="700">latest trends and technologies</tspan> in the ever-evolving tech landscape.</text>

  <!-- Text line 6 -->
  <text x="22" y="213" font-size="13.5" fill="#333333">I bring a unique blend of <tspan font-weight="700">technical expertise</tspan>, <tspan font-weight="700">leadership qualities</tspan>, and a genuine enthusiasm for creating <tspan font-weight="700">impactful software solutions</tspan>.</text>
</svg>
