<svg width="860" height="230" viewBox="0 0 860 230" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <rect width="860" height="230" fill="#f4efe6"/>

  <!-- ── EDUCATION (left) ── -->
  <!-- Label -->
  <rect x="4" y="4" width="112" height="32" rx="8" fill="#1a1a1a" opacity="0.15"/>
  <rect x="0" y="0" width="112" height="32" rx="8" fill="#FFD93D" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="56" y="21" text-anchor="middle" font-size="13" font-weight="800" fill="#1a1a1a" letter-spacing="1.5">EDUCATION</text>
  <!-- Card shadow -->
  <rect x="4" y="48" width="414" height="178" rx="12" fill="#1a1a1a" opacity="0.12"/>
