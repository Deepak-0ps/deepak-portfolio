  <line x1="466" y1="166" x2="846" y2="166" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Italian row -->
  <text x="466" y="190" font-size="13.5" font-weight="500" fill="#1a1a1a">Italian</text>
  <circle cx="760" cy="183" r="7" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="784" cy="183" r="7" fill="none" stroke="#1a1a1a" stroke-width="2"/>
