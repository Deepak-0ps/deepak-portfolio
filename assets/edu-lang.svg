  <text x="466" y="154" font-size="13.5" font-weight="500" fill="#1a1a1a">German</text>
  <circle cx="760" cy="147" r="7" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="784" cy="147" r="7" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2"/>
